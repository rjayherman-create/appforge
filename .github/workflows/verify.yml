name: Verify Platform

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Backend Verification
        run: |
          cd backend
          pip install -r requirements.txt
          PYTHONPATH=. python verify_backend.py

      - name: Frontend Verification
        run: |
          cd frontend
          npm install
          npm run verify
